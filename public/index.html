<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./styles.css">
  <title>Arcaea Song Guessing</title>
</head>

<body>
  <main>
    <h1>Welcome to the Arcaea Song Guessing Game!</h1>
    <p>Guess!!!!!!!!!!!!!!!!</p>
    <button id="about-btn">?</button>
    <div class="search-row">
      <input type="text" id="search-bar" placeholder="Search for a song...">
      <button id="search-button">Search</button>
    </div>
    <div id="search-song-list"></div>
    <div id="results">
      <h3>Your attempts</h3>
      <table id="result-table">
        <thead>
          <tr>
            <td>Title</td>
            <td>Artist</td>
            <td>Song Pack</td>
            <td>BPM</td>
            <td>Future Level</td>
            <td>Eternal Level</td>
            <td>Beyond Level</td>
            <td>Append Version</td>
          </tr>
        </thead>
      </table>
    </div>
    <dialog id="about-dialog">
      <button id="close-dialog">&times;</button>
      <h2>About Arcaea Song Guess</h2>
    
      <p>
        An information bar<br>
        1<br>
        1<br>
        1<br>
        1<br>
        1<br>
        1
      </p>

    </dialog>
    <script src="./script.js"></script>
  </main>
</body>

</html>
